name: Update WvW Data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: read           # only reading — no cache file to commit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3 papaparse

      - name: Fetch & save data
        env:
          JSONBIN_KEY:        ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN_ID:     ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_HIST_ID:    ${{ secrets.JSONBIN_HIST_ID }}
        run: node fetch-data.js
